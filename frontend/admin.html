<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Portal</title>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body>

<script>
let token = null;
let socket = null;

// ✅ FIXED SOCKET
function initSocket() {
    socket = io('https://Digitalschool-system.onrender.com');
}

// ✅ LOGIN
async function loginAdmin() {
    const schoolCode = document.getElementById('loginSchoolCode').value;
    const password = document.getElementById('loginPassword').value;

    const response = await fetch('https://Digitalschool-system.onrender.com/api/auth/admin/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ schoolCode, password })
    });

    const data = await response.json();
}

// ✅ LOAD DATA
async function loadData() {
    const response = await fetch('https://Digitalschool-system.onrender.com/api/school/data', {
        headers: { 'Authorization': `Bearer ${token}` }
    });
}

// ✅ ADD STUDENT
async function addStudent() {
    await fetch('https://Digitalschool-system.onrender.com/api/admin/student/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }
    });
}

// ✅ CHAT
async function loadChatMessages() {
    const response = await fetch('https://Digitalschool-system.onrender.com/api/chat/messages', {
        headers: { 'Authorization': `Bearer ${token}` }
    });
}
</script>

</body>
</html>
