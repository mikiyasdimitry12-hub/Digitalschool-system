<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Portal</title>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body>

<script>
let token = null;
let socket = null;

// ✅ FIXED SOCKET
function initSocket() {
    socket = io('https://Digitalschool-system.onrender.com');
}

// ✅ LOAD DATA
async function loadData() {
    const response = await fetch('https://Digitalschool-system.onrender.com/api/school/data', {
        headers: { 'Authorization': `Bearer ${token}` }
    });
}

// ✅ CHAT
async function loadChatMessages() {
    const response = await fetch('https://Digitalschool-system.onrender.com/api/chat/messages', {
        headers: { 'Authorization': `Bearer ${token}` }
    });
}

// ✅ SEND MESSAGE
function sendMessage() {
    fetch('https://Digitalschool-system.onrender.com/api/chat/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }
    });
}
</script>

</body>
</html>
